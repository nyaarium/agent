name: Workflow Call - Build & Push

on:
  workflow_call:
    inputs:
      variant:
        description: "Build variant (base or godot)"
        type: string
        required: true
      push:
        description: "Push the image to GitHub Container Registry"
        type: boolean
        required: true
      base_artifact:
        description: "Artifact name to download and load before building (sets BASE_IMAGE build arg to that tag)"
        type: string
        required: false
        default: ""
      export_artifact:
        description: "Export the built image as an artifact for downstream jobs"
        type: boolean
        required: false
        default: false
    outputs:
      pushed_new_image:
        description: "Whether a new image was pushed to the registry"
        value: ${{ jobs.build.outputs.pushed_image == 'true' }}

jobs:
  build:
    name: Build ${{ inputs.push && '& Push ' || '' }}(${{ inputs.variant }})
    runs-on: ubuntu-latest
    outputs:
      pushed_image: ${{ steps.push-image.outputs.pushed }}
    env:
      DOCKERFILE: Dockerfile.${{ inputs.variant }}
      BUILD_TAG: build-image-${{ inputs.variant }}
      REPO_NAME: ${{ inputs.variant == 'base' && 'workspace' || format('workspace-{0}', inputs.variant) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download base image artifact
        if: ${{ inputs.base_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.base_artifact }}
          path: /tmp/artifacts

      - name: Load base image into Docker
        if: ${{ inputs.base_artifact != '' }}
        run: docker load -i /tmp/artifacts/image.tar

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          file: ${{ env.DOCKERFILE }}
          tags: ${{ env.BUILD_TAG }}
          push: false
          load: true
          build-args: ${{ inputs.base_artifact != '' && format('BASE_IMAGE={0}', inputs.base_artifact) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image as artifact
        if: ${{ inputs.export_artifact }}
        run: docker save ${{ env.BUILD_TAG }} -o /tmp/image.tar

      - name: Upload image artifact
        if: ${{ inputs.export_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_TAG }}
          path: /tmp/image.tar
          retention-days: 1

      - name: Docker Push
        id: push-image
        if: ${{ fromJSON(inputs.push) }}
        run: |
          docker tag ${{ env.BUILD_TAG }} ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME }}:latest
          echo "pushed=true" >> "$GITHUB_OUTPUT"
